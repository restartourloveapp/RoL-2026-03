name: Deploy Test (Web)

on:
  push:
    branches:
      - main # Continuous deployment to test from main branch

jobs:
  deploy-web:
    runs-on: ubuntu-latest
    environment: test
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Create Firebase Config from Secret
        id: config_step
        run: |
          # Use a heredoc to safely write the secret to a temporary CJS file
          # (using .cjs to bypass "type": "module" in package.json)
          cat <<EOF > config_builder.cjs
          const fs = require('fs');
          const secretContent = \`${{ secrets.FIREBASE_CONFIG_TEST }}\`;
          try {
            const raw = secretContent.trim();
            const jsonString = raw.startsWith('{') ? raw : '{' + raw + '}';
            const config = JSON.parse(jsonString);
            fs.writeFileSync('firebase-applet-config.json', JSON.stringify(config, null, 2));
            console.log('PROJECT_ID=' + config.projectId);
          } catch (e) {
            console.error('Failed to parse FIREBASE_CONFIG_TEST. Ensure it is valid JSON.');
            console.error(e.message);
            process.exit(1);
          }
          EOF
          
          # Run the builder and capture Project ID
          OUTPUT=$(node config_builder.cjs)
          echo "$OUTPUT" >> $GITHUB_OUTPUT

      - name: Build Web App
        run: npm run build
        env:
          VITE_STRIPE_PUBLIC_KEY: ${{ secrets.STRIPE_PUBLIC_KEY_TEST }}
          VITE_FIREBASE_PROJECT_ID: ${{ steps.config_step.outputs.PROJECT_ID }}

      - name: Deploy to Firebase Hosting (Test)
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: '${{ secrets.GITHUB_TOKEN }}'
          firebaseServiceAccount: '${{ secrets.FIREBASE_SERVICE_ACCOUNT_TEST }}'
          channelId: live
          projectId: ${{ steps.config_step.outputs.PROJECT_ID }}
