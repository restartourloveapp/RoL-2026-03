name: Deploy Test (Web)

on:
  push:
    branches:
      - main # Continuous deployment to test from main branch

jobs:
  deploy-web:
    runs-on: ubuntu-latest
    environment: test
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Create Firebase Config from Secret
        id: config_step
        run: |
          RAW_SECRET="${{ secrets.FIREBASE_CONFIG_TEST }}" node scripts/build-firebase-config.cjs >> $GITHUB_OUTPUT

      - name: Build Web App
        run: npm run build
        env:
          VITE_STRIPE_PUBLIC_KEY: ${{ secrets.STRIPE_PUBLIC_KEY_TEST }}
          VITE_FIREBASE_PROJECT_ID: ${{ steps.config_step.outputs.PROJECT_ID }}
          VITE_GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY_TEST }}

      - name: Install Functions Dependencies (Test)
        run: npm ci --prefix functions

      - name: Deploy Firebase Functions (Test)
        run: |
          echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT_TEST }}' > /tmp/sa.json
          export GOOGLE_APPLICATION_CREDENTIALS=/tmp/sa.json
          npx --no-install firebase-tools deploy --only functions --project ${{ steps.config_step.outputs.PROJECT_ID }}
          rm /tmp/sa.json

      - name: Deploy Firestore Rules (Test)
        run: |
          echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT_TEST }}' > /tmp/sa.json
          export GOOGLE_APPLICATION_CREDENTIALS=/tmp/sa.json
          npx --no-install firebase-tools deploy --only firestore:rules --project ${{ steps.config_step.outputs.PROJECT_ID }}
          rm /tmp/sa.json

      - name: Deploy to Firebase Hosting (Test)
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: '${{ secrets.GITHUB_TOKEN }}'
          firebaseServiceAccount: '${{ secrets.FIREBASE_SERVICE_ACCOUNT_TEST }}'
          channelId: live
          projectId: ${{ steps.config_step.outputs.PROJECT_ID }}
