name: Deploy Test (Web)

on:
  push:
    branches:
      - main # Continuous deployment to test from main branch

jobs:
  deploy-web:
    runs-on: ubuntu-latest
    environment: test
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Create Firebase Config from Secret
        id: config_step
        run: |
          # Create a valid JSON object from the secret
          echo '{' > firebase-applet-config.json
          echo "${{ secrets.FIREBASE_CONFIG_TEST }}" >> firebase-applet-config.json
          echo '}' >> firebase-applet-config.json
          
          # Use node to parse the config and extract PROJECT_ID to avoid Python whitespace/format issues
          PROJECT_ID=$(node -e "const fs = require('fs'); const config = JSON.parse(fs.readFileSync('firebase-applet-config.json', 'utf8')); console.log(config.projectId || '');")
          echo "PROJECT_ID=$PROJECT_ID" >> $GITHUB_OUTPUT

      - name: Build Web App
        run: npm run build
        env:
          VITE_STRIPE_PUBLIC_KEY: ${{ secrets.STRIPE_PUBLIC_KEY_TEST }}
          VITE_FIREBASE_PROJECT_ID: ${{ steps.config_step.outputs.PROJECT_ID }}

      - name: Deploy to Firebase Hosting (Test)
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: '${{ secrets.GITHUB_TOKEN }}'
          firebaseServiceAccount: '${{ secrets.FIREBASE_SERVICE_ACCOUNT_TEST }}'
          channelId: live
          projectId: ${{ steps.config_step.outputs.PROJECT_ID }}
